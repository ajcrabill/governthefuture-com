---
layout: default
---

<div class="post-header-wrap">
  <a class="post-back" href="/">&#8592; All Posts</a>
  <div><span class="post-tag">{{ page.category }}</span></div>
  <h1>{{ page.title }}</h1>
  <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
</div>

<div class="post-content-wrap">
  {{ content }}
</div>
